AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31


#===============================================================================
# Define resources to be created
Resources:

  #-----------------------------------------------------------------------------
  # S3 bucket to serve as web server (for HTML page)
  SurveyFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Turn off the "block all public access" flags
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      # Specify index page for web site
      WebsiteConfiguration:
        IndexDocument: index.html

  #-----------------------------------------------------------------------------
  # Policy to make SurveyFrontendBucket objects publicly accessible
  SurveyFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SurveyFrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${SurveyFrontendBucket}/*"

  #-----------------------------------------------------------------------------
  # API Gateway to accept form submission
  # (used to trigger SubmitHandlerFunction)
  SurveyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  #-----------------------------------------------------------------------------
  # Lambda function to store form data in database
  SubmitSurveyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SubmitSurvey
      Runtime: nodejs22.x
      CodeUri: lambdas/SubmitSurvey/
      Handler: index.handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      # Environment variables to be defined when the lambda runs
      Environment:
        Variables:
          TABLE_NAME: !Ref SurveyResponsesTable
      # Triggered by API Gateway when form submission is received
      Events:
        SubmitSurveyEvent:
          Type: Api
          Properties:
            RestApiId: !Ref SurveyApi
            Path: /submit
            Method: post

  #-----------------------------------------------------------------------------
  # DynamoDB table to hold survey results
  SurveyResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SurveyResponses
      BillingMode: PAY_PER_REQUEST
      # Define primary key
      AttributeDefinitions:
        - AttributeName: responseId
          AttributeType: S
      KeySchema:
        - AttributeName: responseId
          KeyType: HASH
      # Define a stream to report actions taken on the table
      # (used to trigger BatchProcessorFunction)
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  #-----------------------------------------------------------------------------
  # Lambda function to aggregate survey statistics into S3
  AggregateStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AggregateStats
      Runtime: nodejs22.x
      CodeUri: lambdas/AggregateStats/
      Handler: index.handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      # Only one instance may run at a time
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          FRONTEND_BUCKET: !Ref SurveyFrontendBucket
      Events:
        # Triggered by stream for SurveyResponsesTable
        StreamTrigger:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt SurveyResponsesTable.StreamArn
            StartingPosition: TRIM_HORIZON
            # Batch actions so that we process them in groups
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 30


#===============================================================================
# Define output values resulting from stack creation
Outputs:
  ApiUrl:
    Value: !Sub "https://${SurveyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/submit"
  FrontendUrl:
    Value: !GetAtt SurveyFrontendBucket.WebsiteURL
  FrontendBucketName:
    Value: !Ref SurveyFrontendBucket
