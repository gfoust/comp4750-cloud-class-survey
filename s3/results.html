<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Results</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 24px; }
    h2 { font-size: 1.1rem; margin-bottom: 8px; margin-top: 28px; }
    .stat-box {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .big-number { font-size: 2rem; font-weight: bold; color: #0073bb; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .bar-label { width: 24px; text-align: right; font-size: 0.9rem; }
    .bar-track {
      flex: 1;
      background: #ddd;
      border-radius: 4px;
      height: 18px;
      overflow: hidden;
    }
    .bar-fill {
      background: #0073bb;
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-count { font-size: 0.85rem; color: #555; width: 28px; }
    .service-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.95rem;
    }
    .service-row:last-child { border-bottom: none; }
    .service-count { font-weight: bold; color: #0073bb; }
    #status { color: #cc0000; font-size: 0.95rem; }
    p.updated { color: #888; font-size: 0.85rem; margin-top: 32px; }
  </style>
</head>
<body>

  <h1>Cloud Computing Course — Survey Results</h1>
  <p class="subtitle">Aggregated statistics from all survey responses.</p>

  <p id="status"></p>

  <div id="results" style="display:none">

    <h2>Responses</h2>
    <div class="stat-box">
      <div class="big-number" id="total-responses">—</div>
      <div>total responses</div>
    </div>

    <h2>Average Rating</h2>
    <div class="stat-box">
      <div class="big-number" id="average-rating">—</div>
      <div>out of 5</div>
    </div>

    <h2>Rating Distribution</h2>
    <div class="stat-box" id="rating-dist"></div>

    <h2>Favorite AWS Service</h2>
    <div class="stat-box" id="service-popularity"></div>

    <p class="updated" id="last-updated"></p>

  </div>

  <script type="module">
    const status = document.getElementById("status");
    const results = document.getElementById("results");

    let stats;
    try {
      const res = await fetch("stats.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      stats = await res.json();
    } catch (err) {
      status.textContent = `Could not load stats: ${err.message}. Results may not be available yet.`;
      // Stop here — nothing to render
      throw err;
    }

    // Total responses and average rating
    document.getElementById("total-responses").textContent = stats.totalResponses;
    document.getElementById("average-rating").textContent = stats.averageRating.toFixed(2);

    // Rating distribution — bar chart
    const dist = stats.ratingDistribution;
    const maxCount = Math.max(...Object.values(dist), 1);
    const distContainer = document.getElementById("rating-dist");
    for (const star of ["5", "4", "3", "2", "1"]) {
      const count = dist[star] ?? 0;
      const pct = Math.round((count / maxCount) * 100);
      distContainer.insertAdjacentHTML("beforeend", `
        <div class="bar-row">
          <div class="bar-label">${star}★</div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct}%"></div>
          </div>
          <div class="bar-count">${count}</div>
        </div>
      `);
    }

    // Service popularity — ranked list
    const svcContainer = document.getElementById("service-popularity");
    const services = Object.entries(stats.servicePopularity)
      .sort((a, b) => b[1] - a[1]);

    if (services.length === 0) {
      svcContainer.textContent = "No data yet.";
    } else {
      for (const [name, count] of services) {
        svcContainer.insertAdjacentHTML("beforeend", `
          <div class="service-row">
            <span>${name}</span>
            <span class="service-count">${count}</span>
          </div>
        `);
      }
    }

    // Last updated timestamp
    if (stats.lastUpdated) {
      const date = new Date(stats.lastUpdated).toLocaleString();
      document.getElementById("last-updated").textContent = `Last updated: ${date}`;
    }

    results.style.display = "block";
  </script>

</body>
</html>
