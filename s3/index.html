<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Computing Survey</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 24px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea { height: 100px; resize: vertical; }
    .rating-group { display: flex; gap: 16px; }
    .rating-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    button {
      background: #0073bb;
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled { background: #aaa; cursor: default; }
    #status { margin-top: 16px; font-size: 1rem; }
    #status.success { color: #1a7a1a; }
    #status.error { color: #cc0000; }
  </style>
</head>
<body>

  <h1>Cloud Computing Course — Student Feedback</h1>
  <p class="subtitle">Your responses are anonymous and help improve the course.</p>

  <form id="survey-form">

    <div class="field">
      <label for="name">1. Your Name</label>
      <input type="text" id="name" name="name" required placeholder="Jane Smith">
    </div>

    <div class="field">
      <label for="email">2. Your Email</label>
      <input type="email" id="email" name="email" required placeholder="jane@example.com">
    </div>

    <div class="field">
      <label>3. Overall Rating</label>
      <div class="rating-group">
        <label><input type="radio" name="rating" value="1" required> 1</label>
        <label><input type="radio" name="rating" value="2"> 2</label>
        <label><input type="radio" name="rating" value="3"> 3</label>
        <label><input type="radio" name="rating" value="4"> 4</label>
        <label><input type="radio" name="rating" value="5"> 5</label>
      </div>
    </div>

    <div class="field">
      <label for="favoriteService">4. Favorite AWS Service So Far</label>
      <select id="favoriteService" name="favoriteService" required>
        <option value="" disabled selected>Select a service…</option>
        <option value="VPC">VPC</option>
        <option value="EC2">EC2</option>
        <option value="CloudFormation">CloudFormation</option>
        <option value="S3">S3</option>
        <option value="DynamoDB">DynamoDB</option>
        <option value="Lambda">Lambda</option>
        <option value="API Gateway">API Gateway</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field">
      <label for="comments">5. Comments or Suggestions</label>
      <textarea id="comments" name="comments" placeholder="Anything you'd like to share…"></textarea>
    </div>

    <button type="submit" id="submit-btn">Submit</button>
    <p id="status"></p>

  </form>

  <div id="success-message" style="display:none">
    <p>Thank you! Your response has been recorded.</p>
    <p><a href="results.html">View survey results</a></p>
  </div>

  <script type="module">
    // TODO: Replace this URL with your API Gateway invoke URL after deploying.
    // It should look like: https://xxxxxxxxxx.execute-api.us-east-1.amazonaws.com/prod/submit
    const API_URL = "https://3bqk8fw5e5.execute-api.us-east-1.amazonaws.com/prod/submit";

    const form = document.getElementById("survey-form");
    const btn = document.getElementById("submit-btn");
    const status = document.getElementById("status");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      status.textContent = "Submitting…";
      status.className = "";

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          form.style.display = "none";
          successMessage.style.display = "block";
        } else {
          throw new Error(`Server returned ${res.status}`);
        }
      } catch (err) {
        status.textContent = `Submission failed: ${err.message}. Please try again.`;
        status.className = "error";
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
